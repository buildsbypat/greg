name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: greg-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Greg
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.DEPLOY_PORT }}" \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<'EOF'
          set -euo pipefail

          cd /opt/greg/app

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          .venv/bin/python -m pip install --upgrade pip --disable-pip-version-check
          .venv/bin/pip install -r requirements.txt --disable-pip-version-check

          sudo -n /usr/bin/systemctl restart greg-bot
          sudo -n /usr/bin/systemctl status greg-bot --no-pager
          EOF